name: "[ORBITAL-UPLINK-SYNC]"

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  # Opt-in to Node 24 now to clear deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "[PULL]: Checkout Repo"
        uses: actions/checkout@v5 # Check if v5 is out, otherwise v4 is fine with the env flag
        
      - name: "[INIT]: Setup Python"
        uses: actions/setup-python@v5 # Use v5 for native Node 24 support
        with:
          python-version: '3.12'

      - name: "[EXEC]: Execute Uplink Script"
        run: python update_readme.py

      - name: "[PUSH]: Commit and Push Changes"
        run: |
          git config --global user.name "TERMINAL-BOT"
          git config --global user.email "bot@cylect.io"
          git add README.md
          git commit -m "[SYSTEM]: Uplink Synchronized. Logs Rotated." || exit 0
          git push
